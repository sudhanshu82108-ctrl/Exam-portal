<div class="row justify-content-center align-items-center min-vh-100">
  <div class="col-lg-5 col-md-8 col-12">
    <div class="login-card p-4 rounded-4">
      <div class="text-center mb-4">
        <div class="display-6 mb-2"><i class="bi bi-mortarboard-fill text-primary"></i></div>
        <h2 class="fw-bold">Online Examination Portal</h2>
        <p class="text-muted-custom">Secure, modern, and professional assessments.</p>
      </div>

      <div class="d-flex gap-2 mb-4">
        <button class="btn flex-fill" ng-class="authMode === 'student' ? 'btn-primary' : 'btn-outline-primary'" ng-click="toggleMode('student')">Student Login</button>
        <button class="btn flex-fill" ng-class="authMode === 'admin' ? 'btn-primary' : 'btn-outline-primary'" ng-click="toggleMode('admin')">Admin Login</button>
      </div>

      <form name="loginForm" novalidate ng-submit="login()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" ng-model="user.username" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" ng-model="user.password" required />
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" ng-model="user.rememberMe" />
          <label class="form-check-label">Remember Me</label>
        </div>
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>

      <div class="mt-3 text-center">
        <a href="#" ng-click="showForgot = !showForgot">Forgot password?</a>
        <div class="mt-2" ng-if="showForgot">
          <small class="text-muted-custom">Use admin/admin123 or student/student123 for demo access.</small>
        </div>
      </div>
    </div>
  </div>
</div>
