<!DOCTYPE html>
<html lang="en" ng-app="examPortalApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Examination Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/exam.css" />
  </head>
  <body ng-class="{ 'dark-mode': darkMode }">
    <div class="loading-overlay" ng-if="isLoading">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" aria-live="polite" aria-atomic="true">
      <div class="toast align-items-center text-bg-dark border-0" ng-repeat="toast in toasts" ng-class="{ 'show': toast.visible }">
        <div class="d-flex">
          <div class="toast-body">{{ toast.message }}</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" ng-click="dismissToast($index)"></button>
        </div>
      </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav" ng-if="showNavbar">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#/student">
          <i class="bi bi-mortarboard-fill fs-4"></i>
          <span>Exam Portal</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item" ng-if="currentUser.role === 'student'">
              <a class="nav-link" href="#/student"><i class="bi bi-speedometer2"></i> Dashboard</a>
            </li>
            <li class="nav-item" ng-if="currentUser.role === 'student'">
              <a class="nav-link" href="#/exam"><i class="bi bi-pencil-square"></i> Exam</a>
            </li>
            <li class="nav-item" ng-if="currentUser.role === 'admin'">
              <a class="nav-link" href="#/admin"><i class="bi bi-shield-lock"></i> Admin</a>
            </li>
            <li class="nav-item">
              <button class="btn btn-outline-light btn-sm" ng-click="toggleTheme()">
                <i class="bi" ng-class="darkMode ? 'bi-sun' : 'bi-moon'" aria-hidden="true"></i>
              </button>
            </li>
            <li class="nav-item" ng-if="currentUser">
              <button class="btn btn-danger btn-sm" ng-click="logout()">
                <i class="bi bi-box-arrow-right"></i> Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container-fluid px-3 py-4">
      <div ng-view></div>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="js/app.js"></script>
    <script src="js/routes.js"></script>
    <script src="js/services/AuthService.js"></script>
    <script src="js/services/DataService.js"></script>
    <script src="js/controllers/AuthController.js"></script>
    <script src="js/controllers/StudentDashboardController.js"></script>
    <script src="js/controllers/ExamController.js"></script>
    <script src="js/controllers/ResultController.js"></script>
    <script src="js/controllers/AdminController.js"></script>
    <script src="js/directives/portalCard.js"></script>
    <script src="js/filters/filters.js"></script>
  </body>
</html>
